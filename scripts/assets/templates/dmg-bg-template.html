<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Fonts inlined as base64 data URIs by build-dmg-assets.mjs at render
     time so the DMG background is hermetic — no network, no system-font
     drift, identical pixels in CI and local. */
  @font-face {
    font-family: 'DM Serif Display';
    font-style: normal;
    font-weight: 400;
    src: url(__DM_SERIF_DISPLAY_REGULAR__) format('truetype');
  }
  @font-face {
    font-family: 'DM Sans';
    font-style: normal;
    font-weight: 400;
    src: url(__DM_SANS_REGULAR__) format('truetype');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400;
    src: url(__JETBRAINS_MONO_REGULAR__) format('truetype');
  }
  @font-face {
    font-family: 'Noto Sans';
    font-style: normal;
    font-weight: 400;
    src: url(__NOTO_SANS_REGULAR__) format('truetype');
  }

  body {
    /* 600×400 logical CSS design. `zoom: 2` doubles every measurement
       so the rendered raster comes out at 1200×800 (retina-ready for
       DMG backgrounds). build-dmg-assets.mjs sets the matching
       1200×800 Chromium viewport. */
    zoom: 2;
    width: 600px;
    height: 400px;
    overflow: hidden;
    background: #faf9f6;
    position: relative;
    font-family: 'DM Sans', 'Noto Sans', sans-serif;
    color: #1a1816;
  }

  /* Top-center wordmark */
  .wordmark {
    position: absolute;
    top: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'DM Serif Display', 'Noto Sans', Georgia, serif;
    font-size: 16px;
    color: #1a1816;
    letter-spacing: 0.01em;
  }

  /* Faint watermark: Polish diacritics.
     Constrained horizontally to the middle band (180..420 px) so the
     glyphs cannot intrude into the 140×140 reserved zones on left or
     right columns. */
  .watermark {
    position: absolute;
    left: 180px;
    width: 240px;
    top: 110px;
    height: 180px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', 'Noto Sans', Georgia, serif;
    font-size: 120px;
    line-height: 1;
    color: #1a1816;
    opacity: 0.08;
    letter-spacing: 0.02em;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  /* 1px hairline verticals separating columns (at 30% and 70%). */
  .divider {
    position: absolute;
    top: 60px;
    bottom: 60px;
    width: 1px;
    background: #6b6560;
    opacity: 0.35;
  }
  .divider.left  { left: 180px; }
  .divider.right { left: 420px; }

  /* Reserved 140×140 zones — intentionally empty (icon overlay target). */
  .reserved {
    position: absolute;
    width: 140px;
    height: 140px;
    top: 110px;
  }
  .reserved.left  { left: 20px; }
  .reserved.right { left: 440px; }

  /* Caption below each reserved zone. Width matches the 140px reserved
     zone so Russian uppercase (longer than English) does not clip into
     the page edge. */
  .caption {
    position: absolute;
    top: 260px;
    width: 140px;
    text-align: center;
    font-family: 'DM Sans', 'Noto Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b6560;
  }
  .caption.left  { left: 20px; }
  .caption.right { left: 440px; }

  /* Middle column — step flow. */
  .middle {
    position: absolute;
    top: 110px;
    left: 180px;
    width: 240px;
    height: 140px;
  }

  .numerals {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 28px;
  }
  .numerals span {
    font-family: 'DM Serif Display', 'Noto Sans', Georgia, serif;
    font-size: 40px;
    color: #1a1816;
    line-height: 1;
  }

  .arrow {
    position: absolute;
    top: 58px;
    left: 18px;
    right: 18px;
    display: flex;
    align-items: center;
  }
  .arrow-line {
    flex: 1;
    height: 2px;
    background: #1a1816;
  }
  .arrow-head {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #1a1816;
  }

  .step-captions {
    position: absolute;
    top: 78px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
    padding: 0 2px;
    overflow: hidden;
  }
  .step-captions .step {
    flex: 1;
    font-family: 'DM Sans', 'Noto Sans', sans-serif;
    font-size: 10px;
    line-height: 1.3;
    color: #1a1816;
    text-align: center;
  }
  .step-captions .path {
    display: inline-block;
    color: #c4362c;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0;
    word-break: break-all;
  }

  /* Bottom footer: hairline rule + url. */
  .footer {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .footer-rule {
    width: 60px;
    height: 1px;
    background: #6b6560;
    opacity: 0.4;
    margin: 0 auto 6px auto;
  }
  .footer-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #1a1816;
    opacity: 0.4;
  }
</style>
</head>
<body>
  <div class="wordmark">__WORDMARK__</div>

  <div class="watermark">__WATERMARK__</div>

  <div class="divider left"></div>
  <div class="divider right"></div>

  <div class="reserved left"></div>
  <div class="reserved right"></div>

  <div class="caption left">__CAPTION_LEFT__</div>
  <div class="caption right">__README_LABEL__</div>

  <div class="middle">
    <div class="numerals">
      <span>1</span>
      <span>2</span>
      <span>3</span>
    </div>
    <div class="arrow">
      <div class="arrow-line"></div>
      <div class="arrow-head"></div>
    </div>
    <div class="step-captions">
      <div class="step">__STEP1__</div>
      <div class="step">__STEP2__</div>
      <div class="step">__STEP3__</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-rule"></div>
    <div class="footer-url">polish-typographic.com</div>
  </div>
</body>
</html>
