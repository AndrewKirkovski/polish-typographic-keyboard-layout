<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&display=swap');
  * { margin: 0; padding: 0; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .icon {
    width: 512px;
    height: 512px;
    border-radius: 96px;
    background: linear-gradient(135deg, #d4403a 0%, #b82e28 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.15), inset 0 -2px 0 rgba(0,0,0,0.1);
  }
  .letter {
    font-family: 'DM Serif Display', Georgia, serif;
    font-style: italic;
    font-size: 340px;
    color: white;
    line-height: 1;
    margin-top: -10px;
    text-shadow: 5px 0 0 white, 0 2px 8px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
  <div class="icon">
    <span class="letter">K</span>
  </div>
</body>
</html>
