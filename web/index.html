      <h1>Kirkouski Typographic Keyboard Layout</h1>
      <p>Custom keyboard layouts for <strong>Windows</strong> and <strong>macOS</strong> that add typographic symbols via AltGr (Right Alt) on top of standard Polish Programmers and Russian ЙЦУКЕН layouts.</p>
      <p>Type em dashes (—), curly quotes (""), copyright (©), euro (€), arrows (← → ↑ ↓), math symbols (± × ÷ ≠ ≈ ∞), and 80+ more characters without switching layouts.</p>
      <p>Based on <a href="https://ilyabirman.ru/typography-layout/">Ilya Birman's Typography Layout</a>.</p>
