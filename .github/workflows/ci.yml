name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Windows DLLs
        run: |
          python build_kbd_c.py
          python compile_kbd.py

      - name: Build KLC files
        run: python build_klc.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Inno Setup installer
        run: |
          $version = (Get-Content VERSION).Trim()
          # Organize DLLs into expected directory
          $winDir = "dist/windows-v$version"
          New-Item -ItemType Directory -Force -Path $winDir | Out-Null
          Copy-Item dist/pltypo.dll $winDir/
          Copy-Item dist/rutypo.dll $winDir/
          Copy-Item dist/ustypo.dll $winDir/
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVERSION=$version installer.iss

      - name: Validate keylayouts (JSON)
        run: python validate_keylayout.py polish_typographic_full.json russian_typographic_full.json

      - name: Build pronunciation fonts
        run: |
          pip install fonttools
          python polish_liga.py --variant cyrillic --input scripts/assets/fonts/NotoSans-Regular.ttf --output dist/SzpargalkaSans-Regular.ttf
          python polish_liga.py --variant ipa --input scripts/assets/fonts/NotoSans-Regular.ttf --output dist/PolishPhoneticsSans-Regular.ttf

      - name: Verify outputs
        run: |
          $version = (Get-Content VERSION).Trim()
          $expected = @(
            "dist/pltypo.dll", "dist/rutypo.dll", "dist/ustypo.dll",
            "dist/pltypo.klc", "dist/rutypo.klc", "dist/ustypo.klc",
            "dist/kirkouski-typographic-v$version-windows-setup.exe",
            "dist/SzpargalkaSans-Regular.ttf",
            "dist/PolishPhoneticsSans-Regular.ttf"
          )
          foreach ($f in $expected) {
            if (!(Test-Path $f)) { throw "$f not found" }
          }
          Write-Host "All Windows outputs verified ($($expected.Count) files)"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web app
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build macOS keylayouts
        run: python build_keylayout.py

      - name: Build macOS bundle
        run: python build_macos_bundle.py

      - name: Validate keylayouts
        run: python validate_keylayout.py dist/polish_typographic.keylayout dist/russian_typographic.keylayout

      - name: Verify outputs
        run: |
          test -f dist/polish_typographic.keylayout || (echo "Polish keylayout missing" && exit 1)
          test -f dist/russian_typographic.keylayout || (echo "Russian keylayout missing" && exit 1)
          test -d "build/macos/Kirkouski Typographic.bundle" || (echo "macOS bundle missing" && exit 1)
          echo "All macOS outputs verified"
