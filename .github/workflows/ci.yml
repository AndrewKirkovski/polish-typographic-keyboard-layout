name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Windows DLLs
        run: |
          python build_kbd_c.py
          python compile_kbd.py

      - name: Build KLC files
        run: python build_klc.py

      - name: Verify outputs
        run: |
          if (!(Test-Path "dist/pltypo.dll")) { throw "pltypo.dll not found" }
          if (!(Test-Path "dist/rutypo.dll")) { throw "rutypo.dll not found" }
          if (!(Test-Path "dist/pltypo.klc")) { throw "pltypo.klc not found" }
          Write-Host "All Windows outputs verified"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web app
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build macOS keylayouts
        run: python build_keylayout.py

      - name: Verify outputs
        run: |
          test -f dist/polish_typographic.keylayout || (echo "Polish keylayout missing" && exit 1)
          test -f dist/russian_typographic.keylayout || (echo "Russian keylayout missing" && exit 1)
          echo "All macOS outputs verified"
